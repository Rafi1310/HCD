<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Podcast Visualizer voor Darice</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Podcast Visualizer</h1>
            <img src="images/cover-grot.png" alt="" class="podcast-cover">
        </header>

        <div id="knoppen-balk">
            <button onclick="startLuisterModus()" class="btn-primary">▶️ Luisteren</button>
            <button onclick="startLeesModusKleurrijk()" class="btn-secondary">📖 Lezen (Kleurrijk)</button>
            <button onclick="startLeesModusSaai()" class="btn-tertiary">📄 Lezen (Focus)</button>
        </div>
        
        <div id="sfeer-balk">Achtergrondgeluid: [ Geen ]</div>

        <div id="transcriptie"></div>
    </div>

    <script src="/scripts/script.js"></script>
</body>
</html>
